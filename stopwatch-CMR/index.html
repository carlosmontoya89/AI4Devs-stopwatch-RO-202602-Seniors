<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stopwatch and Countdown</title>
  <style>
    :root {
      --bg: #e8e8ea;
      --panel: #d8daee;
      --border: #2f2f34;
      --text: #111;
      --ok: #00dd00;
      --warn: #e00000;
      --muted: #4a4a52;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      padding: 16px;
    }

    .app {
      width: min(980px, 100%);
      display: grid;
      gap: 20px;
    }

    .mode-selector {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .mode-option {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 2px solid var(--border);
      border-radius: 999px;
      padding: 8px 14px;
      background: #fff;
      font-weight: 700;
    }

    .display-panel {
      border: 8px solid var(--border);
      border-radius: 36px;
      background: var(--panel);
      min-height: 250px;
      padding: 24px;
      display: grid;
      gap: 10px;
      align-content: center;
    }

    .timer-main {
      text-align: center;
      font-size: clamp(2.6rem, 13vw, 8rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
    }

    .timer-sub {
      text-align: right;
      font-size: clamp(1.1rem, 4vw, 2rem);
      font-variant-numeric: tabular-nums;
      min-height: 1.2em;
      color: var(--muted);
      padding-right: 14px;
    }

    .inputs {
      display: grid;
      grid-template-columns: repeat(3, minmax(84px, 1fr));
      gap: 12px;
      width: min(440px, 100%);
      margin: 0 auto;
    }

    .inputs.hidden {
      display: none;
    }

    .input-block {
      display: grid;
      gap: 6px;
    }

    .input-block label {
      font-size: 0.9rem;
      font-weight: 700;
    }

    .input-block input {
      width: 100%;
      padding: 10px;
      border: 2px solid var(--border);
      border-radius: 12px;
      text-align: center;
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 14px;
    }

    button {
      border: 8px solid var(--border);
      border-radius: 24px;
      padding: 18px 16px;
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 800;
      cursor: pointer;
      color: #000;
      transition: transform 120ms ease, opacity 120ms ease;
      min-height: 92px;
    }

    button:hover:enabled {
      transform: translateY(-2px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .start-btn {
      background: var(--ok);
    }

    .pause-btn {
      background: #ffd84c;
    }

    .resume-btn {
      background: #59b8ff;
    }

    .clear-btn {
      background: #ff1818;
    }

    .status {
      min-height: 1.6rem;
      text-align: center;
      font-weight: 700;
    }

    .status.error {
      color: #a90000;
    }

    .status.success {
      color: #006400;
    }

    @media (max-width: 760px) {
      .controls {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }

      .display-panel {
        min-height: 210px;
      }

      button {
        min-height: 76px;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Stopwatch and countdown app">
    <section class="mode-selector" aria-label="Mode selector">
      <label class="mode-option" for="mode-stopwatch">
        <input type="radio" id="mode-stopwatch" name="mode" value="stopwatch" checked>
        Stopwatch
      </label>
      <label class="mode-option" for="mode-countdown">
        <input type="radio" id="mode-countdown" name="mode" value="countdown">
        Countdown
      </label>
    </section>

    <section class="display-panel" aria-label="Timer display panel">
      <div id="timeMain" class="timer-main" aria-live="polite">00:00:00</div>
      <div id="timeSub" class="timer-sub" aria-hidden="true">000</div>

      <div id="countdownInputs" class="inputs hidden" aria-label="Countdown duration input">
        <div class="input-block">
          <label for="hoursInput">Hours</label>
          <input id="hoursInput" type="number" inputmode="numeric" min="0" max="99" step="1" value="00" aria-label="Hours input">
        </div>
        <div class="input-block">
          <label for="minutesInput">Minutes</label>
          <input id="minutesInput" type="number" inputmode="numeric" min="0" max="59" step="1" value="00" aria-label="Minutes input">
        </div>
        <div class="input-block">
          <label for="secondsInput">Seconds</label>
          <input id="secondsInput" type="number" inputmode="numeric" min="0" max="59" step="1" value="10" aria-label="Seconds input">
        </div>
      </div>
    </section>

    <section class="controls" aria-label="Timer controls">
      <button id="startBtn" class="start-btn" type="button">Start</button>
      <button id="pauseBtn" class="pause-btn" type="button">Pause</button>
      <button id="resumeBtn" class="resume-btn" type="button">Resume</button>
      <button id="clearBtn" class="clear-btn" type="button">Clear</button>
    </section>

    <p id="statusMessage" class="status" role="status" aria-live="assertive"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
